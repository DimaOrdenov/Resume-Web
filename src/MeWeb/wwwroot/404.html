<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Dmitrii Ordenov</title>
    <script>
        // GitHub Pages SPA routing: encode path into query string and redirect to index
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
            l.pathname.slice(1).split('/').join('/') +
            (l.search ? '&q=' + l.search.slice(1).split('&').join('~and~') : '') +
            l.hash
        );
    </script>
</head>
<body></body>
</html>
